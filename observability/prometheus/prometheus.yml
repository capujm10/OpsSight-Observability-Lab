global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    platform: opsight-observability-lab

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: optional-workstation-targets
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/*.json
        refresh_interval: 30s
