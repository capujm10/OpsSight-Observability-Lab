global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    platform: opsight-observability-lab

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: local-runtime-exporter
    static_configs:
      - targets: ["local-runtime-exporter:9108"]
        labels:
          service: local-runtime-exporter

  - job_name: windows-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:9182"]
        labels:
          service: windows-host
          host_domain: windows

  - job_name: docker-daemon
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9323"]
        labels:
          service: docker-desktop

  - job_name: node-exporter-wsl
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: wsl2

  - job_name: kubernetes-kube-state-metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: kube-state-metrics
          cluster: local

  - job_name: kubernetes-metrics-server
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["host.docker.internal:4443"]
        labels:
          service: metrics-server
          cluster: local

  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]
        labels:
          service: gpu
