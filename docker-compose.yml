name: opsight-observability-lab

services:
  api:
    build:
      context: ./apps/api
    container_name: opsight-api
    environment:
      OPSIGHT_ENVIRONMENT: local
      OPSIGHT_LOG_LEVEL: INFO
      OPSIGHT_OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      OPSIGHT_DEPENDENCY_URL: http://dependency:8080
    ports:
      - "8000:8000"
    depends_on:
      alloy:
        condition: service_started
      dependency:
        condition: service_healthy
    labels:
      logging: "promtail"
      service: "opsight-api"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  dependency:
    build:
      context: ./apps/dependency
    container_name: opsight-payment-gateway
    environment:
      DEPENDENCY_ENVIRONMENT: local
      DEPENDENCY_LOG_LEVEL: INFO
      DEPENDENCY_OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      DEPENDENCY_FAILURE_RATE: "0.0"
    ports:
      - "8081:8080"
    depends_on:
      alloy:
        condition: service_started
    labels:
      logging: "promtail"
      service: "payment-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  ai-rca:
    build:
      context: ./apps/ai-rca
    container_name: opsight-ai-rca
    environment:
      OPSIGHT_ENVIRONMENT: local
      AI_RCA_LOG_LEVEL: INFO
      OPSIGHT_OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      AI_MODEL: ${AI_MODEL:-llama3.2}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:11434}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_MAX_INPUT_CHARS: ${AI_MAX_INPUT_CHARS:-12000}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-800}
      AI_RCA_ARTIFACT_DIR: /app/artifacts/ai-rca
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
      GRAFANA_URL: http://localhost:3000
    ports:
      - "8090:8090"
    volumes:
      - ./artifacts/ai-rca:/app/artifacts/ai-rca
    depends_on:
      alloy:
        condition: service_started
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    labels:
      logging: "promtail"
      service: "opsight-ai-rca"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  local-runtime-exporter:
    build:
      context: ./apps/local-runtime-exporter
    container_name: opsight-local-runtime-exporter
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      HOST_ROOT: /host-root
    ports:
      - "9108:9108"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host-root:ro
    labels:
      logging: "promtail"
      service: "local-runtime-exporter"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9108/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: opsight-alloy
    privileged: true
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks: [opsight]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: opsight-dcgm-exporter
    profiles: ["gpu"]
    cap_add:
      - SYS_ADMIN
    ports:
      - "9400:9400"
    networks: [opsight]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: opsight-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  loki:
    image: grafana/loki:3.3.2
    container_name: opsight-loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  tempo:
    image: grafana/tempo:2.6.1
    container_name: opsight-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4319:4317"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [opsight]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: opsight-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor correlations
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [opsight]

  k6:
    image: grafana/k6:0.55.0
    container_name: opsight-k6
    profiles: ["load"]
    environment:
      BASE_URL: http://api:8000
    volumes:
      - ./load/k6:/scripts:ro
    command: run /scripts/smoke.js
    depends_on:
      api:
        condition: service_healthy
    networks: [opsight]

networks:
  opsight:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
