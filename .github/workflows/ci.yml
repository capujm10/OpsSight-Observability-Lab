name: OpsSight CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: opsight-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  lint-format:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.8.4
      - name: Ruff lint
        run: python -m ruff check apps scripts tests
      - name: Ruff format check
        run: python -m ruff format --check apps scripts tests

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/dependency/requirements.txt
            apps/ai-rca/requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt
          python -m pip install -r apps/dependency/requirements.txt
          python -m pip install -r apps/ai-rca/requirements.txt
          python -m pip install mypy==1.14.1
      - name: Type check services
        run: |
          python -m mypy --no-incremental --config-file pyproject.toml apps/api/app
          python -m mypy --no-incremental --config-file pyproject.toml apps/dependency/app
          python -m mypy --no-incremental --config-file pyproject.toml apps/ai-rca/app

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/dependency/requirements.txt
            apps/ai-rca/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt
          python -m pip install -r apps/dependency/requirements.txt
          python -m pip install -r apps/ai-rca/requirements.txt
      - name: Run API tests in service context
        working-directory: apps/api
        run: python -m pytest
      - name: Run AI RCA tests in service context
        working-directory: apps/ai-rca
        run: python -m pytest
      - name: Run repository tests
        run: python -m pytest tests

  validate-infra:
    name: Validate infra
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: azure/setup-kubectl@v4
      - name: Install YAML tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint==1.35.1
      - name: Validate YAML
        run: >
          python -m yamllint -d "{extends: relaxed, rules: {line-length: disable}}"
          docker-compose.yml observability k8s .github helm
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client -f k8s/base -f k8s/api -f k8s/monitoring

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/dependency/requirements.txt
            apps/ai-rca/requirements.txt
            apps/local-runtime-exporter/requirements.txt
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.9.0
      - name: Audit Python dependencies
        run: |
          for req in apps/api/requirements.txt apps/dependency/requirements.txt apps/ai-rca/requirements.txt apps/local-runtime-exporter/requirements.txt; do
            python -m pip_audit -r "$req"
          done
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  docker-build:
    name: Build containers
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - tests
      - validate-infra
    steps:
      - uses: actions/checkout@v4
      - name: Build Compose services
        run: docker compose build

  smoke:
    name: Smoke test stack
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d --build
      - name: Smoke test
        run: bash scripts/smoke-test.sh
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
