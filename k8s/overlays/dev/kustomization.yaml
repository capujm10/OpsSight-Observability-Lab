apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../api
  - ../../monitoring
namespace: opsight-dev
images:
  - name: opsight/api
    newTag: dev
  - name: opsight/payment-gateway
    newTag: dev
  - name: opsight/ai-rca
    newTag: dev
patches:
  - target:
      kind: Namespace
      name: opsight
    patch: |-
      - op: replace
        path: /metadata/name
        value: opsight-dev
  - target:
      kind: ClusterRole
      name: kube-state-metrics
    patch: |-
      - op: replace
        path: /metadata/name
        value: kube-state-metrics-opsight-dev
  - target:
      kind: ClusterRoleBinding
      name: kube-state-metrics
    patch: |-
      - op: replace
        path: /metadata/name
        value: kube-state-metrics-opsight-dev
      - op: replace
        path: /roleRef/name
        value: kube-state-metrics-opsight-dev
  - path: environment-config.yaml
  - path: ingress.yaml
  - path: replicas.yaml
  - path: resources.yaml
