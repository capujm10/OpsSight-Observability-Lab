apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsight-api
  namespace: opsight
  labels:
    app: opsight-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opsight-api
  template:
    metadata:
      labels:
        app: opsight-api
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: opsight/api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: opsight-api-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
