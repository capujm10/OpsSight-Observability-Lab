apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opsight-api
  namespace: opsight
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  rules:
    - host: opsight-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opsight-api
                port:
                  number: 8000
