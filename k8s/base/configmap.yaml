apiVersion: v1
kind: ConfigMap
metadata:
  name: opsight-api-config
  namespace: opsight
data:
  OPSIGHT_ENVIRONMENT: kubernetes
  OPSIGHT_LOG_LEVEL: INFO
  OPSIGHT_DEPENDENCY_URL: http://payment-gateway:8080
  OPSIGHT_OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opsight-ai-rca-config
  namespace: opsight
data:
  OPSIGHT_ENVIRONMENT: kubernetes
  AI_RCA_LOG_LEVEL: INFO
  OPSIGHT_OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
  AI_PROVIDER: rule_based
  AI_MODEL: llama3.2
  AI_BASE_URL: http://ollama.local:11434
  AI_TIMEOUT_SECONDS: "30"
  AI_MAX_INPUT_CHARS: "12000"
  AI_MAX_OUTPUT_TOKENS: "800"
  PROMETHEUS_URL: http://prometheus:9090
  LOKI_URL: http://loki:3100
  TEMPO_URL: http://tempo:3200
  GRAFANA_URL: http://grafana:3000
